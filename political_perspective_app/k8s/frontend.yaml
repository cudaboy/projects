# frontend.yaml : 프론트엔드 배포 및 외부망 노출

apiVersion: apps/v1
kind: Deployment
metadata:
  name: spectrum-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spectrum-frontend
  template:
    metadata:
      labels:
        app: spectrum-frontend
    spec:
      containers:
      - name: frontend
        image: spectrum-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8501
        env:
        # K8s 내부의 backend-service 이름으로 통신하도록 주입
        - name: BACKEND_API_URL
          value: "http://backend-service:8000/analyze"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  type: NodePort # 브라우저에서 접속할 수 있도록 포트 개방
  selector:
    app: spectrum-frontend
  ports:
    - protocol: TCP
      port: 8501
      targetPort: 8501
      # nodePort: 30501 # localhost:30501 로 접속 가능