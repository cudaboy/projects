---
# 1. Backend Deployment (애플리케이션 배포)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-analyst-backend
  labels:
    app: backend
spec:
  replicas: 1 # 트래픽이 많아지면 2~3개로 늘려 스케일 아웃 가능
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          # 위에서 빌드한 백엔드 이미지명
          image: ai-analyst-backend:latest 
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          # 보안을 위해 API 키 등은 K8s Secret이나 ConfigMap에서 주입받는 것이 좋습니다.
          env:
            - name: OPENAI_API_KEY
              value: "your-openai-api-key-here"
            - name: LANGCHAIN_API_KEY
              value: "your-langsmith-key-here"

---
# 2. Backend Service (내부 네트워크 연결)
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: ClusterIP # 클러스터 내부에서만 접근 가능 (보안 유지)
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8000        # Service가 노출하는 포트
      targetPort: 8000  # 컨테이너 내부 포트