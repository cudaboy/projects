# ai_analyst_app : 멀티 에이전트 주식 분석 시스템 통합 실행 파일

services:
  # 1. 백엔드 서비스 (FastAPI + LangGraph) [cite: 3]
  backend:
    image: ai-analyst-backend:latest
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: ai-analyst-backend
    ports:
      - "8000:8000"
    env_file:
      - .env  # API 키(OpenAI, Naver 등) 주입
    volumes:
      # 🌟 중요: 컨테이너 내부의 DB 파일을 로컬의 ai_analyst.db와 동기화하여 데이터 보존
      - ./ai_analyst.db:/app/ai_analyst.db
    restart: always

  # 2. 프론트엔드 서비스 (Streamlit) [cite: 1]
  frontend:
    image: ai-analyst-frontend:latest
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: ai-analyst-frontend
    ports:
      - "8501:8501"
    environment:
      # 🌟 Docker 네트워크 내부에서 프론트엔드가 백엔드 컨테이너를 찾을 수 있도록 URL 설정
      - API_BASE_URL=http://backend:8000/api/v1
    depends_on:
      - backend
    restart: always